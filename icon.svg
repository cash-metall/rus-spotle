<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Микрофон">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="15" fill="url(#bg)"/>
  <!-- капсюль микрофона -->
  <rect x="25" y="12" width="14" height="25" rx="7" fill="#fff"/>
  <!-- держатель, ножка, основание -->
  <g fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round">
    <path d="M20 30 C20 42 44 42 44 30"/>
    <line x1="32" y1="39" x2="32" y2="50"/>
    <line x1="24" y1="52" x2="40" y2="52"/>
  </g>
  <!-- решётка -->
  <g stroke="#7c3aed" stroke-width="2.4" stroke-linecap="round">
    <line x1="28.5" y1="19" x2="35.5" y2="19"/>
    <line x1="28.5" y1="24" x2="35.5" y2="24"/>
    <line x1="28.5" y1="29" x2="35.5" y2="29"/>
  </g>
</svg>
